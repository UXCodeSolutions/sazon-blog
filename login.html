<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sazón Blog - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-icon">🍃</div>
        <a href="index.html" class="brand-name">Sazón Blog</a>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="categories.html">Recipes</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <div class="auth-actions">
          <a href="login.html" class="header-login active">Log In</a>
          <a href="register.html" class="btn-primary btn-sm">Join</a>
        </div>
      </div>
    </div>
  </header>

  <main class="site-main">
    <div class="container auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to your Sazón account</p>
        </div>

        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input id="login-email" type="email" placeholder="you@email.com" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <div class="brand">
          <div class="brand-icon">🍃</div>
          <span class="brand-name">Sazón Blog</span>
        </div>
        <p class="muted">El sabor de cada día</p>
        <div class="footer-links">
          <a href="privacy.html">Privacy</a>
          <a href="terms.html">Terms</a>
          <a href="cookies.html">Cookies</a>
          <a href="contact.html">Contact</a>
        </div>
        <p class="copyright">© 2026 Sazón. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
